name: Backend Deploy to AWS ECS

on:
  push:
    branches:
      - main # Runs when code is pushed or merged into the main branch
    paths:
      - "backend/**" # Only runs if there are changes inside the backend folder

jobs:
  deploy:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the latest code from GitHub
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      # 4. Run tests
      - name: Run unit tests
        env:
          DATABASE_URL: sqlite:///test.db
          OPENAI_API_KEY: mock-openai-key-for-testing
        run: |
          cd backend
          python -m pytest

      # 5. Log in to AWS using your GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # <-- Change this if your AWS region is different (e.g. ap-south-1)

      # 3. Log in to Amazon ECR
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build the Docker image and push it to AWS ECR
      - name: Build, Tag, and Push Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ai-support-backend
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f backend/Dockerfile backend/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # 5. Tell AWS ECS Fargate to pull the new image and redeploy
      - name: Force ECS Fargate Redeploy
        run: |
          aws ecs update-service --cluster ai-support-cluster --service ai-support-backend-task-service --force-new-deployment --region us-east-1
